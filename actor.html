<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>FilmChiin | Actor page</title>
    <meta name="description" content="View actor profile and related posts on FilmChiin" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="/shared-sections.js"></script>
    <script defer src="/actor.js"></script>
  </head>
  <body class="index-body movie-page-body actor-page-body">
    <header class="main-header movie-page-header-only">
      <div id="movieBannerMount" class="site-banner"></div>
    </header>

    <main class="movie-page-container actor-page-container">
      <a class="movie-page-back" href="/" data-i18n="backToHome">← Back to homepage</a>
      <section id="actorPageStatus" class="movie-page-status" data-i18n="loading">Loading...</section>

      <section id="actorHeader" class="actor-profile-card" hidden>
        <div class="actor-avatar-wrap">
          <img id="actorAvatar" class="actor-avatar" src="/images/icons8-user-96.png" alt="actor" />
          <div id="actorAvatarFallback" class="actor-avatar-fallback" hidden>
            <img src="/images/icons8-user-96.png" alt="profile" />
          </div>
        </div>
        <h1 id="actorName" class="actor-name">-</h1>
      </section>

      <section id="actorMoviesBlock" class="actor-movies-block" hidden>
        <h2 class="actor-movies-title" data-i18n="actorMovies">Actor movies</h2>
        <div id="actorMoviesList" class="actor-movies-list"></div>
      </section>
    </main>

    <div id="movieFeaturesMount"></div>

    <!-- Social Links Section -->
    <section class="social-links-section" id="socialLinksSection">
      <a class="social-link-card" href="tg://resolve?domain=filmchiin" target="_blank" rel="noopener">
        <div class="social-link-icon">
          <img src="/images/icons8-telegram-96.png" alt="Telegram" />
        </div>
        <span class="social-link-label">کانال تلگرام</span>
        <span class="social-link-join-bubble">Join</span>
      </a>
    </section>

    <!-- Bottom Dock (same as homepage) -->
    <nav class="mobile-bottom-dock" aria-label="quick actions">
      <div class="dock-item-wrap">
        <button id="bottomMenuBtn" class="dock-btn no-btn-bg" aria-label="menu" type="button">
          <img src="/images/icons8-menu-64.png" alt="menu" />
        </button>
        <span class="dock-label">Menu</span>
      </div>
      <div class="dock-item-wrap">
        <a id="bottomFavoritesBtn" class="dock-btn no-btn-bg" aria-label="favorite movies" type="button">
          <img src="/images/icons8-heart-50.png" alt="favorites" />
        </a>
        <span class="dock-label">Favorites</span>
      </div>
      <div class="dock-item-wrap">
        <button id="bottomSearchBtn" class="dock-btn no-btn-bg" aria-label="focus search" type="button">
          <i class="bi bi-search"></i>
        </button>
        <span class="dock-label">Search</span>
      </div>
    </nav>
  </body>
</html>
