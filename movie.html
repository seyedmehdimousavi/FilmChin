<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>FilmChiin | دانلود فیلم و سریال</title>
    <meta name="description" content="دانلود فیلم و سریال با لینک مستقیم در FilmChiin | فیلمچین" />
    <meta name="keywords" content="دانلود فیلم, دانلود سریال, فیلم جدید, filmchiin, فیلمچین" />
    <meta name="robots" content="index,follow,max-snippet:-1,max-image-preview:large,max-video-preview:-1" />
    <meta property="og:type" content="article" />
    <meta property="og:site_name" content="FilmChiin | فیلمچین" />
    <meta property="og:title" content="FilmChiin | دانلود فیلم و سریال" />
    <meta property="og:description" content="دانلود فیلم و سریال با لینک مستقیم" />
    <meta property="og:image" content="https://filmchiin.ir/images/banner-icon.png" />
    <meta property="og:url" content="https://filmchiin.ir/movie/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@filmchiin" />
    <meta name="twitter:title" content="FilmChiin | دانلود فیلم و سریال" />
    <meta name="twitter:description" content="دانلود فیلم و سریال با لینک مستقیم" />
    <meta name="twitter:image" content="https://filmchiin.ir/images/banner-icon.png" />
    <link rel="canonical" href="https://filmchiin.ir/movie/" />
    <link rel="preconnect" href="https://filmchiin.ir" />
    <!-- JSON-LD پیش‌فرض — با loadMoviePage جایگزین میشه -->
    <script type="application/ld+json" id="movieJsonLd">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "FilmChiin | دانلود فیلم و سریال",
      "url": "https://filmchiin.ir/movie/",
      "publisher": {
        "@type": "Organization",
        "name": "FilmChiin",
        "url": "https://filmchiin.ir",
        "logo": "https://filmchiin.ir/images/banner-icon.png"
      }
    }
    </script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="/shared-sections.js"></script>
    <script defer src="/movie.js"></script>
  </head>
  <body class="index-body movie-page-body">
    <header class="main-header movie-page-header-only">
      <div id="movieBannerMount" class="site-banner"></div>
    </header>

    <main class="movie-page-container">
      <a class="movie-page-back" href="/" data-i18n="backToHome">← Back to homepage</a>
      <section id="moviePageStatus" class="movie-page-status" data-i18n="loading">Loading...</section>
      <section id="moviePageCard" class="movie-page-single" hidden></section>
    </main>

    <div id="movieFeaturesMount"></div>

    <!-- Social Links Section -->
    <section class="social-links-section" id="socialLinksSection">
      <a class="social-link-card" href="tg://resolve?domain=filmchiin" target="_blank" rel="noopener">
        <div class="social-link-icon">
          <img src="/images/icons8-telegram-96.png" alt="Telegram" />
        </div>
        <span class="social-link-label">کانال تلگرام</span>
        <span class="social-link-join-bubble">Join</span>
      </a>
    </section>

    <!-- Bottom Dock (same as homepage) -->
    <nav class="mobile-bottom-dock" aria-label="quick actions">
      <div class="dock-item-wrap">
        <button id="bottomMenuBtn" class="dock-btn no-btn-bg" aria-label="menu" type="button">
          <img src="/images/icons8-menu-64.png" alt="menu" />
        </button>
        <span class="dock-label">Menu</span>
      </div>
      <div class="dock-item-wrap">
        <a id="bottomFavoritesBtn" class="dock-btn no-btn-bg" aria-label="favorite movies" type="button">
          <img src="/images/icons8-heart-50.png" alt="favorites" />
        </a>
        <span class="dock-label">Favorites</span>
      </div>
      <div class="dock-item-wrap">
        <button id="bottomSearchBtn" class="dock-btn no-btn-bg" aria-label="focus search" type="button">
          <i class="bi bi-search"></i>
        </button>
        <span class="dock-label">Search</span>
      </div>
    </nav>

    <div id="postOptionsOverlay" class="post-options-overlay" aria-hidden="true">
      <div class="post-options-backdrop"></div>
      <div class="post-options-modal" id="postOptionsModal">
        <div class="post-options-header">
          <span id="postOptionsTitle" class="post-options-title">Post options</span>
          <button id="postOptionsCloseBtn" class="post-options-close-btn" aria-label="Close">&times;</button>
        </div>
        <div class="post-options-list">
          <button id="postOptionFavorite" class="post-option-item" type="button">
            <div class="post-option-main">
              <div class="post-option-title">Add to favorite</div>
              <div id="postOptionFavoriteStatus" class="post-option-subtitle">Add to your favorites</div>
            </div>
          </button>
          <button id="postOptionCopyLink" class="post-option-item" type="button">
            <div class="post-option-main">
              <div class="post-option-title">Copy link</div>
              <div class="post-option-subtitle">Copy movie page link</div>
            </div>
          </button>
          <button id="postOptionShareLink" class="post-option-item" type="button">
            <div class="post-option-main">
              <div class="post-option-title">Share link</div>
              <div class="post-option-subtitle">Share movie link with other apps</div>
            </div>
          </button>
        </div>
      </div>
    </div>

  </body>
</html>
