<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>FilmChiin | صفحه ژانر</title>
    <meta name="description" content="فیلم‌ها بر اساس ژانر در FilmChiin | فیلمچین" />
    <meta name="keywords" content="دانلود فیلم, ژانر, filmchiin, فیلمچین" />
    <meta name="robots" content="index,follow" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="/style.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/telegram-webapp.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="/shared-sections.js"></script>
    <script defer src="/genre.js"></script>
  </head>
  <body class="index-body movie-page-body genre-page-body">
    <header class="main-header movie-page-header-only">
      <div id="movieBannerMount" class="site-banner"></div>
    </header>

    <main class="movie-page-container genre-page-container">
      <a class="movie-page-back" href="/" data-i18n="backToHome">← Back to homepage</a>

      <!-- Genre Hero Bubble -->
      <div class="genre-hero-bubble">
        <div class="genre-hero-icon">
          <img src="/images/icons8-comedy-96.png" alt="genre" />
        </div>
        <h1 class="genre-hero-title" id="genreHeroTitle">-</h1>
        <p class="genre-hero-subtitle" id="genreHeroSubtitle">
          <span data-i18n="genrePageWatching">شما در حال تماشای فیلم‌هایی با ژانر</span>
          <span class="genre-hero-name-accent" id="genreHeroAccent"></span>
          <span data-i18n="genrePageAre">هستید</span>
        </p>
      </div>

      <!-- Status -->
      <section id="genrePageStatus" class="movie-page-status" data-i18n="loading">Loading...</section>

      <!-- Movies Grid -->
      <div class="genre-movies-block" id="genreMoviesBlock" hidden>
        <div class="similar-block-card">
          <div class="similar-movies-title">
            <img src="/images/icons8-movie.apng" style="width:22px;height:22px;">
            <strong id="genreMoviesTitle"></strong>
          </div>
          <div class="favorites-grid coming-soon-grid similar-movies-container genre-movies-grid" id="genreMoviesGrid"></div>

          <!-- Show More Button -->
          <div class="genre-show-more-wrap" id="genreShowMoreWrap" hidden>
            <div class="button-wrap genre-show-more-btn-wrap">
              <button class="genre-show-more-btn" id="genreShowMoreBtn" type="button">
                <span data-i18n="showMore">نمایش بیشتر</span>
              </button>
              <div class="button-shadow"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Empty State -->
      <div class="genre-empty-state" id="genreEmptyState" hidden>
        <p data-i18n="genreNoMovies">فیلمی برای این ژانر پیدا نشد.</p>
      </div>
    </main>

    <!-- Genre Hub Section -->
    <section class="genre-hub-section" id="genreHubSection">
      <div class="genre-hub-header">
        <img src="/images/icons8-comedy-96.png" alt="genres" class="genre-hub-icon" />
        <div class="genre-hub-titles">
          <h2 class="genre-hub-title" data-i18n="genreHubTitle">ژانر ها</h2>
          <p class="genre-hub-subtitle" data-i18n="genreHubSubtitle">برای دانلود فیلم و سریال های ژانر مورد علاقه روش کلیک کن.</p>
        </div>
      </div>
      <div class="genre-hub-grid" id="genreHubGrid">
        <!-- filled by genre hub script -->
      </div>
    </section>

    <div id="movieFeaturesMount"></div>

    <!-- Social Links Section -->
    <section class="social-links-section" id="socialLinksSection">
      <a class="social-link-card" href="tg://resolve?domain=filmchiin" target="_blank" rel="noopener">
        <div class="social-link-icon">
          <img src="/images/icons8-telegram-96.png" alt="Telegram" />
        </div>
        <span class="social-link-label">کانال تلگرام</span>
        <span class="social-link-join-bubble">Join</span>
      </a>
    </section>

    <!-- Bottom Dock (same as homepage) -->
    <nav class="mobile-bottom-dock" aria-label="quick actions">
      <div class="dock-item-wrap">
        <button id="bottomMenuBtn" class="dock-btn no-btn-bg" aria-label="menu" type="button">
          <img src="/images/icons8-menu-64.png" alt="menu" />
        </button>
        <span class="dock-label">Menu</span>
      </div>
      <div class="dock-item-wrap">
        <a id="bottomFavoritesBtn" class="dock-btn no-btn-bg" aria-label="favorite movies" type="button">
          <img src="/images/icons8-heart-50.png" alt="favorites" />
        </a>
        <span class="dock-label">Favorites</span>
      </div>
      <div class="dock-item-wrap">
        <button id="bottomSearchBtn" class="dock-btn no-btn-bg" aria-label="focus search" type="button">
          <i class="bi bi-search"></i>
        </button>
        <span class="dock-label">Search</span>
      </div>
    </nav>
  </body>
</html>
